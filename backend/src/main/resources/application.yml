spring:
  application:
    name: yooncount-book
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

github:
  token: ${GITHUB_TOKEN:}
  repo-owner: ${GITHUB_REPO_OWNER:ps-suihn-yoon}
  repo-name: ${GITHUB_REPO_NAME:yooncount-book}

finnhub:
  api-key: ${FINNHUB_API_KEY:}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
