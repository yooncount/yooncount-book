services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: yooncount_book
      POSTGRES_USER: ${DB_USER:?DB_USER required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d yooncount_book"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: yooncount/yooncount-book-api:latest
    restart: unless-stopped
    ports:
      - "28080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/yooncount_book
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "true"
      GITHUB_TOKEN: ${GITHUB_TOKEN:?GITHUB_TOKEN required}
      GITHUB_REPO_OWNER: ${GITHUB_REPO_OWNER:?GITHUB_REPO_OWNER required}
      GITHUB_REPO_NAME: ${GITHUB_REPO_NAME:?GITHUB_REPO_NAME required}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?APP_ENCRYPTION_KEY required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
    depends_on:
      db:
        condition: service_healthy

  web:
    image: yooncount/yooncount-book-web:latest
    restart: unless-stopped
    ports:
      - "13009:80"
    depends_on:
      - api

volumes:
  postgres_data:
