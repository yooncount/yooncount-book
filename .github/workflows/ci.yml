name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yooncount_test
          POSTGRES_USER: yooncount
          POSTGRES_PASSWORD: yooncount
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yooncount"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: backend
        run: ./mvnw verify -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/yooncount_test
          SPRING_DATASOURCE_USERNAME: yooncount
          SPRING_DATASOURCE_PASSWORD: yooncount
