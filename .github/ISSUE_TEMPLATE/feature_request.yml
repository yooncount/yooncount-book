name: ✨ Feature Request
description: 새로운 기능을 제안해 주세요.
title: "[FEAT] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안을 환영합니다!
        제출 전에 **동일한 제안이 이미 등록되어 있지 않은지** 확인해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 문제 상황
      description: 현재 어떤 불편함이나 문제가 있어서 이 기능이 필요한가요?
      placeholder: 예) 현재 가계부 내역을 카테고리별로 필터링할 수 없어서 분석이 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 제안 기능
      description: 어떤 기능이 추가되기를 원하나요? API 설계안이 있다면 함께 작성해 주세요.
      placeholder: |
        예) GET /api/v1/transactions?category=FOOD 와 같이 카테고리 필터 파라미터를 지원해 주세요.

        **API 설계안 (선택)**
        - Method: GET
        - Endpoint: /api/v1/transactions
        - Query Params: category (string), startDate, endDate
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: 기대 효과
      description: 이 기능이 추가되면 어떤 점이 개선되나요?
      placeholder: 예) 카테고리별 지출 현황을 한눈에 파악할 수 있어 가계 관리가 용이해집니다.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      description: 이 기능의 중요도를 선택해 주세요.
      options:
        - 🔴 High - 핵심 기능 / 빠른 반영 필요
        - 🟡 Medium - 있으면 좋은 기능
        - 🟢 Low - 장기적으로 고려
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대체 방안
      description: 현재 이 문제를 우회하는 방법이 있다면 작성해 주세요. (선택)
      placeholder: 예) 현재는 전체 내역을 받아서 클라이언트에서 직접 필터링하고 있습니다.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: 추가 정보
      description: 참고 자료, 유사 서비스 예시 등 관련 정보를 첨부해 주세요. (선택)
    validations:
      required: false
